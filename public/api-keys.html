<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Manage bunOS MCP API keys for user-owned wallet access." />
    <title>bunOS API Keys</title>
    <link rel="icon" href="/bunOS.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="top-bar" aria-label="bunOS navigation">
        <a href="/" class="brand-lockup">
          <svg class="brand-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" aria-hidden="true">
            <path fill="#FB3315" d="m52.5 37.4-11.9-27.5c-0.2-0.5-0.7-1-1.3-1.3l-21.7-7.4c-2.4-0.8-4.6 1.2-4 3.4l13.1 28.9c0.3 0.7 0.8 1.3 1.6 1.7l12.1 4.4c0.1 0.1 0.4 0.1 0.5 0 2.2-0.8 5.9-2.2 11.6-2.1v-0.1z"/>
            <path fill="#FB3315" d="m62.1 7.4v32.8c0 0.7 0.4 1.5 0.9 2l16.1 15.7c1.6 1.5 5 1 5-1.9v-32.4c0-0.7-0.4-1.5-0.8-1.9l-16.5-16.2c-1.5-1.5-4.7-0.6-4.7 1.9z"/>
            <path fill="#FB3315" d="m86.2 58.9c0-0.4-0.2-1.5-0.1-1.2v-1.1h-0.1c-0.4 1.8-1.7 3.9-5 3.9-1 0-2.1-0.4-3.1-1.2l-16.4-15.7c-0.6-0.6-1.2-1.4-1.5-2.4-2.4-0.8-5.2-1.6-9-1.6-3.3 0-7.3 0.7-11.2 2.6l-20.6 11.6c-1.7 1.1-3 2.9-3 5.5v5.7c2.8 1.5 5.5 5.5 5.7 10.1 0 0.3-0.2 0.6-0.4 0.5l-1.8-1c-0.5-2.2-2-5.2-3.5-6.7v12.1c0.2 2 1.1 3.9 3 5.1l19.2 10.6c3.3 1.9 7.5 3.4 13 3.5 4.4 0 8.8-0.8 12.8-2.8l19.4-11c1.8-1 3.1-3 3.1-5.8v-20.7z"/>
          </svg>
          <strong>bunOS</strong>
        </a>

        <nav class="top-nav" aria-label="Main navigation">
          <a href="/wallet" class="nav-link">Wallet</a>
          <a href="/terminal" class="nav-link">Terminal</a>
          <a href="/mcp-guide" class="nav-link">MCP Guide</a>
          <a href="/api-keys" class="nav-link active">API Keys</a>
        </nav>

        <button id="logoutButton" type="button" class="ghost-button danger-button">Logout</button>
      </header>

      <main class="wallet-main single-column">
        <section class="page-section">
          <div class="view-head">
            <div>
              <span class="panel-kicker">Developer access</span>
              <h1 class="settings-title">API keys</h1>
            </div>
            <button id="createApiKey" type="button" class="primary-action">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
              New key
            </button>
          </div>

          <div id="signinPanel" class="connect-card is-hidden">
            <div class="connect-provider">
              <span class="x-logo-mark" aria-hidden="true">X</span>
              <span class="panel-kicker">X account</span>
            </div>
            <strong>Sign in to create MCP API keys.</strong>
            <p>API keys connect your MCP clients to the same Circle wallet created from your X account.</p>
            <button id="signinButton" type="button" class="x-signin-button">
              <span class="x-signin-mark" aria-hidden="true">X</span>
              Sign in with X
            </button>
          </div>

          <div id="newApiKeyPanel" class="api-key-secret is-hidden"></div>

          <div class="api-key-config glass-card">
            <span class="panel-kicker">MCP config</span>
            <pre id="mcpConfigSnippet"></pre>
          </div>

          <div class="api-key-config glass-card">
            <span class="panel-kicker">MCP URL prompt</span>
            <pre id="mcpUrlPrompt"></pre>
          </div>

          <div id="apiKeyList" class="api-key-list"></div>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script type="module" src="/api-keys.js"></script>
  </body>
</html>
